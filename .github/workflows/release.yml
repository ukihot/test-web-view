name: Release
run-name: Release ${{ inputs.version || github.ref_name }} by @${{ github.actor }}

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      VERSION_INPUT: ${{ inputs.version }}
      REF_NAME: ${{ github.ref_name }}
      EVENT_NAME: ${{ github.event_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version and tag
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$VERSION_INPUT"
            if [[ -z "$VERSION" ]]; then
              echo "version input is required"
              exit 1
            fi
          else
            TAG_FROM_REF="$REF_NAME"
            VERSION="${TAG_FROM_REF#v}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi

          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate version input
        shell: bash
        run: |
          set -euo pipefail
          echo "Version: ${{ steps.release_meta.outputs.version }}"
          echo "Tag: ${{ steps.release_meta.outputs.tag }}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint & format check (frontend)
        shell: bash
        run: |
          deno fmt --check ui/
          deno lint ui/

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-tauri-release
          save-if: "true"
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Install Tauri CLI
        shell: bash
        run: cargo install tauri-cli --locked

      - name: Build bundle
        shell: bash
        run: cargo tauri build

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          TOKEN="${{ secrets.RELEASE_TOKEN }}"
          TAG="${{ steps.release_meta.outputs.tag }}"

          if [[ -z "$TOKEN" ]]; then
            echo "secrets.RELEASE_TOKEN is required for workflow_dispatch tag push."
            echo "Create a PAT with repository contents write + workflows write, then set RELEASE_TOKEN."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin"
          else
            git tag "$TAG"
            git push "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git" "$TAG"
          fi

      - name: Ensure release assets exist
        shell: bash
        run: |
          set -euo pipefail

          find target/release/bundle -type f \( \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*.zip" -o \
            -name "*.dmg" -o \
            -name "*.deb" -o \
            -name "*.AppImage" \) > release-assets.txt

          if [[ ! -s release-assets.txt ]]; then
            echo "No bundle artifacts found"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true
          files: |
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.zip
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.AppImage
